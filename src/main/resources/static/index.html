<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>OCR Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="login-page" class="center">
    <div class="card login">
        <h1>OCR System</h1>
        <input id="login" placeholder="Логин">
        <input id="password" type="password" placeholder="Пароль">
        <button onclick="login()">Войти</button>
        <p id="error"></p>
    </div>
</div>

<div id="app" class="hidden">

    <aside class="sidebar">
        <h2>OCR</h2>
        <p>Загрузка документов</p>
        <button class="menu-btn" onclick="showMainScreen()">Обработка</button>
        <button class="menu-btn" onclick="showDocumentsScreen()">Список документов</button>
    </aside>

    <main class="main">

        <div class="topbar">
            <h1>Обработка документа</h1>
        </div>

        <div id="main-screen" class="content">

            <div class="card upload">
                <h3>Загрузить файл</h3>
                <input type="file" id="fileInput">
                <button onclick="upload()">Отправить</button>
                <p id="status"></p>
            </div>

            <div class="card result">
                <h3>Результат</h3>
                <div class="result-grid">
                    <div><b>ID:</b> <span id="id">-</span></div>
                    <div><b>Тип:</b> <span id="type">-</span></div>
                </div>
                <pre id="raw"></pre>
            </div>

        </div>

        <div id="documents-screen" class="content hidden">
            <div class="card documents-list">
                <h3>Добавленные документы</h3>
                <div id="documentsList"></div>
            </div>
        </div>

    </main>
</div>

<script src="app.js"></script>
</body>
</html>
