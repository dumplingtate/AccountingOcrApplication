# Application name
spring.application.name=document-ocr-system

# Server configuration
server.port=8080
server.servlet.context-path=/api

# Database configuration (H2 for development)
spring.datasource.url=jdbc:h2:mem:ocrdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# File storage
file.upload-dir=./uploads
file.max-size=10485760

# ML Service configuration
ml.service.url=http://localhost:5001
ml.service.timeout=30000

# Logging
logging.level.com.accounting.ocr=DEBUG
logging.level.org.springframework.web=INFO

# Swagger/OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html