# Application name
spring.application.name=document-ocr-system


spring.profiles.active=${SPRING_PROFILES_ACTIVE:postgres}

# Server configuration
server.port=8080
server.servlet.context-path=/api

# JPA (общее)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# File storage
file.upload-dir=./uploads
file.max-size=10485760

# ML Service Configuration
ml.service.url=http://localhost:5001
ml.service.timeout=30000
ml.service.enabled=true

# Logging
logging.level.com.accounting.ocr=DEBUG
logging.level.org.springframework.web=INFO

# Swagger/OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
