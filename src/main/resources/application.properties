# Application name
spring.application.name=document-ocr-system

# Server configuration
server.port=8080
server.servlet.context-path=/api

# H2 Database Configuration (in-memory)
spring.datasource.url=jdbc:h2:mem:ocrdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_UPPER=false
#spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true
spring.web.resources.add-mappings=true

# JPA configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true


# File storage
file.upload-dir=./uploads
file.max-size=10485760

# ML Service Configuration
ml.service.url=http://localhost:5001
ml.service.timeout=30000
ml.service.enabled=true

# Logging
logging.level.com.accounting.ocr=DEBUG
logging.level.org.springframework.web=INFO

# Swagger/OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true